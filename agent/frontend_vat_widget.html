<!doctype html>
<html>
<head>
  <meta charset="utf-8">
  <title>VAT Widget</title>
</head>
<body>
  <div id="vat-list">Loading VAT data…</div>
  <div id="agent-commit">Checking agent version…</div>
  <script>
    async function loadVat() {
      try {
        const res = await fetch('/agent/vat');
        const json = await res.json();
        const el = document.getElementById('vat-list');
        el.innerHTML = '<pre>' + JSON.stringify(json, null, 2) + '</pre>';
        // also fetch commit status
        try {
          const c = await fetch('/agent/commit');
          const cj = await c.json();
          const ac = document.getElementById('agent-commit');
          if (cj && cj.commit) {
            ac.textContent = 'Agent commit: ' + cj.commit;
          } else {
            ac.textContent = 'Agent commit unavailable';
          }
        } catch (e) {
          // ignore
        }
      } catch (e) {
        document.getElementById('vat-list').textContent = 'Error loading VAT data';
      }
    }
    loadVat();
  </script>
</body>
</html>
